name: Deploy Metadata Webtool
on:
  push:
    branches:
      - master
  schedule:
    - cron: '53 22 * * *'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Refresh Data
        run: python refresh_datajs.py

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: static
          branch: gh-pages
